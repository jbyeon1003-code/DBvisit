<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DBHitek 방문신청 자동화</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #eef2f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 540px;
    }

    /* ── 헤더 ── */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header .badge {
      display: inline-block;
      background: #1a56db;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 800;
      color: #1e293b;
      letter-spacing: -0.5px;
    }
    .header p {
      margin-top: 6px;
      font-size: 14px;
      color: #64748b;
    }

    /* ── 카드 ── */
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .card-section {
      padding: 24px 28px;
      border-bottom: 1px solid #f1f5f9;
    }
    .card-section:last-child { border-bottom: none; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 16px;
    }

    /* ── 날짜 입력 ── */
    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 7px;
    }
    .field input[type="date"] {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: #1e293b;
      background: #f8fafc;
      outline: none;
      transition: border-color .18s, background .18s;
      cursor: pointer;
    }
    .field input[type="date"]:focus {
      border-color: #1a56db;
      background: #fff;
    }

    /* ── 방문 정보 테이블 ── */
    .info-grid {
      display: grid;
      gap: 8px;
    }
    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      background: #f8fafc;
      border-radius: 9px;
      font-size: 13px;
    }
    .info-key {
      color: #94a3b8;
      font-weight: 600;
      flex-shrink: 0;
      margin-right: 12px;
    }
    .info-val {
      color: #334155;
      font-weight: 600;
      text-align: right;
    }

    /* ── 버튼 ── */
    .card-footer {
      padding: 22px 28px 28px;
    }
    .btn-run {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1a56db 0%, #1040b8 100%);
      color: #fff;
      border: none;
      border-radius: 13px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .15s, transform .12s;
      letter-spacing: 0.2px;
    }
    .btn-run:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-run:active:not(:disabled) { opacity: 1; transform: translateY(0); }
    .btn-run:disabled {
      background: linear-gradient(135deg, #94a3b8, #7a8fa8);
      cursor: not-allowed;
      transform: none;
    }

    /* ── 상태 메시지 ── */
    .status {
      margin-top: 14px;
      padding: 13px 15px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
      display: none;
    }
    .status.show { display: flex; align-items: flex-start; gap: 9px; }
    .status.loading { background: #eff6ff; color: #1d4ed8; }
    .status.success { background: #f0fdf4; color: #15803d; }
    .status.error   { background: #fff1f2; color: #be123c; }

    .status-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ── 스피너 ── */
    .spinner {
      width: 17px; height: 17px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 안내 ── */
    .note {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 16px;
      line-height: 1.6;
    }
    .note strong { color: #64748b; }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- 헤더 -->
  <div class="header">
    <div class="badge">DBHitek IMS</div>
    <h1>방문 신청 자동화</h1>
    <p>날짜를 선택하고 자동 입력을 시작하세요</p>
  </div>

  <!-- 카드 -->
  <div class="card">

    <!-- 날짜 선택 섹션 -->
    <div class="card-section">
      <div class="section-label">방문 기간 선택</div>
      <div class="date-row">
        <div class="field">
          <label for="startDate">방문 시작일</label>
          <input type="date" id="startDate" />
        </div>
        <div class="field">
          <label for="endDate">방문 종료일</label>
          <input type="date" id="endDate" />
        </div>
      </div>
    </div>

    <!-- 자동 입력 정보 섹션 -->
    <div class="card-section">
      <div class="section-label">자동 입력될 정보</div>
      <div class="info-grid">
        <div class="info-row">
          <span class="info-key">회사</span>
          <span class="info-val">상우 캠퍼스</span>
        </div>
        <div class="info-row">
          <span class="info-key">담당자</span>
          <span class="info-val">채명주</span>
        </div>
        <div class="info-row">
          <span class="info-key">출입지역</span>
          <span class="info-val">상우캠퍼스 어드민동</span>
        </div>
        <div class="info-row">
          <span class="info-key">방문목적</span>
          <span class="info-val">업무협의</span>
        </div>
        <div class="info-row">
          <span class="info-key">방문객</span>
          <span class="info-val">변정호 · ASML</span>
        </div>
        <div class="info-row">
          <span class="info-key">생년월일</span>
          <span class="info-val">1990-08-12</span>
        </div>
        <div class="info-row">
          <span class="info-key">연락처</span>
          <span class="info-val">010-3802-0065</span>
        </div>
      </div>
    </div>

    <!-- 버튼 섹션 -->
    <div class="card-footer">
      <button class="btn-run" id="runBtn" onclick="runAuto()">
        <span id="btnIcon">🚀</span>
        <span id="btnText">자동 입력 시작</span>
      </button>

      <!-- 상태 메시지 -->
      <div class="status" id="status">
        <span class="status-icon" id="statusIcon"></span>
        <span id="statusMsg"></span>
      </div>
    </div>
  </div>

  <!-- 안내 문구 -->
  <p class="note">
    신청 버튼은 자동으로 누르지 않습니다.<br />
    <strong>내용 확인 후 직접 눌러주세요.</strong>
  </p>

</div>

<script>
  // 오늘 날짜 기본값 설정
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('startDate').value = today;
  document.getElementById('endDate').value   = today;

  async function runAuto() {
    const start = document.getElementById('startDate').value;
    const end   = document.getElementById('endDate').value;

    // 유효성 검사
    if (!start || !end) {
      showStatus('error', '⚠️', '날짜를 모두 선택해주세요.');
      return;
    }
    if (start > end) {
      showStatus('error', '⚠️', '종료일이 시작일보다 빠릅니다. 다시 확인해주세요.');
      return;
    }

    // 버튼 로딩 상태
    const btn = document.getElementById('runBtn');
    btn.disabled = true;
    document.getElementById('btnIcon').innerHTML = '<div class="spinner"></div>';
    document.getElementById('btnText').textContent = '브라우저 실행 중...';
    showStatus('loading', '⏳', `${start} ~ ${end} 으로 자동 입력 중입니다. 잠시 기다려주세요.`);

    try {
      const res  = await fetch('/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ start, end }),
      });
      const data = await res.json();

      if (data.ok) {
        showStatus('success', '✅', '브라우저가 열리며 자동 입력이 시작됩니다. 내용 확인 후 신청 버튼을 눌러주세요.');
      } else {
        showStatus('error', '❌', '오류: ' + (data.error || '알 수 없는 오류가 발생했습니다.'));
      }
    } catch (e) {
      showStatus('error', '❌', '서버에 연결할 수 없습니다. start.bat 를 먼저 실행해주세요.');
    } finally {
      btn.disabled = false;
      document.getElementById('btnIcon').textContent = '🚀';
      document.getElementById('btnText').textContent = '자동 입력 시작';
    }
  }

  function showStatus(type, icon, msg) {
    const el   = document.getElementById('status');
    el.className = 'status show ' + type;
    document.getElementById('statusIcon').textContent = icon;
    document.getElementById('statusMsg').textContent  = msg;
  }
</script>
</body>
</html>
